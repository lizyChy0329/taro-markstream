<svg id="mermaid-class" xmlns="http://www.w3.org/2000/svg" class="classDiagram" viewBox="0 0 220 140" role="graphics-document document" aria-roledescription="class">
  <defs>
    <radialGradient id="classFill" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ececff" />
    </radialGradient>
  </defs>
  <g class="classGroup" id="class-Base">
    <rect x="20" y="20" width="180" height="90" fill="url(#classFill)" stroke="#9370db" />
    <line x1="20" y1="50" x2="200" y2="50" stroke="#9370db" />
    <line x1="20" y1="80" x2="200" y2="80" stroke="#9370db" />
    <text x="110" y="40"><tspan>Base</tspan></text>
    <text x="30" y="70"><tspan>+ id</tspan></text>
    <text x="30" y="100"><tspan>+ render()</tspan></text>
  </g>
</svg>
